#         </clickhouse>
#
#       # S3 disk + tiered storage policy for ClickHouse
#       # IRSA: leave access_key_id / secret_access_key empty — the instance
#       # metadata service provides credentials automatically
#       storage_s3.xml: |
#         <clickhouse>
#           <storage_configuration>
#             <disks>
#               <s3>
#                 <type>s3</type>
#                 <!-- Trailing slash required; data lands under this prefix -->
#                 <endpoint>https://my-company-rushobs.s3.us-east-1.amazonaws.com/clickhouse/</endpoint>
#                 <!-- No keys needed with IRSA — remove both lines if using IRSA -->
#                 <!-- <access_key_id></access_key_id> -->
#                 <!-- <secret_access_key></secret_access_key> -->
#                 <region>us-east-1</region>
#                 <!-- Cache hot S3 data on local disk (speeds up re-reads) -->
