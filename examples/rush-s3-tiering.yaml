# ══════════════════════════════════════════════════════════════════════════════
# OPTION 3 — MinIO (on-prem S3-compatible object storage)
#
# Works with any S3-compatible backend: MinIO, Ceph RGW, Garage, Wasabi, etc.
# The only difference from AWS is the endpoint URL and (usually) path-style URLs.
#
# Pre-requisites:
#   • MinIO running in-cluster or on-prem (e.g. minio.storage.svc.cluster.local)
#   • A bucket named rushobs-clickhouse created in MinIO
#   • Access key / secret with full access to that bucket
# ══════════════════════════════════════════════════════════════════════════════

clickhouse:
  enabled: true
  shardsCount: 1
  replicasCount: 1
  image:
    repository: altinity/clickhouse-server
    tag: "25.3.6.10034.altinitystable"
    pullPolicy: IfNotPresent
  clickhouse:
    defaultUser:
      # kubectl create secret generic rushobs-clickhouse-credentials \
      #   --from-literal=password=<your-password>
      password_secret_name: "rushobs-clickhouse-credentials"
      allowExternalAccess: true
    configurationFiles:
      rush_settings.xml: |
        <clickhouse>
          <custom_settings_prefixes>rush_</custom_settings_prefixes>
        </clickhouse>

      # MinIO S3 disk — note use_environment_credentials=0 and region can be
      # anything for MinIO (it ignores the value but the field must be present)
      storage_s3.xml: |
        <clickhouse>
          <storage_configuration>
            <disks>
              <s3>
                <type>s3</type>
                <!-- MinIO endpoint: include the bucket in the path, trailing slash required -->
                <endpoint>http://minio.storage.svc.cluster.local:9000/rushobs-clickhouse/clickhouse/</endpoint>
                <access_key_id>minio-access-key</access_key_id>
                <secret_access_key>minio-secret-key</secret_access_key>
                <!-- Required for path-style MinIO URLs -->
                <use_environment_credentials>0</use_environment_credentials>
                <region>us-east-1</region>
                <metadata_path>/var/lib/clickhouse/disks/s3/</metadata_path>
              </s3>
              <s3_cache>
                <type>cache</type>
                <disk>s3</disk>
                <path>/var/lib/clickhouse/s3_cache/</path>
                <!-- 20 Gi local cache for recently-read MinIO data -->
                <max_size>21474836480</max_size>
              </s3_cache>
            </disks>
            <policies>
              <tiered>
                <volumes>
                  <hot>
                    <disk>default</disk>
                    <!-- Parts under 1 Gi stay on fast local disk -->
                    <max_data_part_size_bytes>1073741824</max_data_part_size_bytes>
                  </hot>
                  <cold>
                    <disk>s3_cache</disk>
                  </cold>
                </volumes>
                <move_factor>0.2</move_factor>
              </tiered>
            </policies>
          </storage_configuration>
        </clickhouse>

  persistence:
    enabled: true
    storageClass: ""   # cluster default; use fast SSDs for the hot tier
    size: 200Gi

  keeper:
    enabled: false
  operator:
    enabled: true

rushConfig:
  storage:
    s3:
      enabled: true
      # MinIO endpoint WITHOUT the bucket name (Rush appends bucket itself)
      endpoint: "http://minio.storage.svc.cluster.local:9000"
      bucket: "rushobs-clickhouse"
      access_key_id: "minio-access-key"
      secret_access_key: "minio-secret-key"
      region: "us-east-1"   # arbitrary value for MinIO
    tiering:
      # Move partitions to MinIO after N days of inactivity on local disk
      metrics_move_after_days: 7
      traces_move_after_days: 3
      logs_move_after_days: 7
  retention:
    defaults:
      metrics_days: 365
      traces_days: 90
      logs_days: 90
    metrics: []
    traces: []
    enforcer:
      enabled: true
      interval_secs: 3600
      dry_run: false


# ══════════════════════════════════════════════════════════════════════════════
# OPTION 4 — RustFS (S3-compatible, Rust-native object storage)
#
# RustFS is a high-performance, S3-compatible object store written in Rust.
# It exposes the same S3 API as MinIO, so the ClickHouse disk config is
# identical — only the endpoint URL changes.
#
# Pre-requisites:
#   • RustFS running in-cluster or on-prem
#     (e.g. rustfs.storage.svc.cluster.local:9000)
#   • A bucket named rushobs-clickhouse created in RustFS
#   • Access key / secret with read+write access to that bucket
# ══════════════════════════════════════════════════════════════════════════════

