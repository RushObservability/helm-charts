# ──────────────────────────────────────────────────────────────────────────────
# Rush Observability — S3 Tiered Storage Examples
#
# ClickHouse stores hot data on local SSD (fast reads) and automatically moves
# older partitions to S3-compatible object storage (cheap, unlimited capacity).
# Rush queries both tiers transparently — no application changes needed.
#
# This file shows four configurations — pick the one matching your environment:
#
#   1. AWS S3 with IAM Roles for Service Accounts (IRSA)   ← recommended for EKS
#   2. AWS S3 with static access keys                      ← simpler, less secure
#   3. MinIO / on-prem S3-compatible object storage        ← self-hosted
#   4. RustFS / S3-compatible Rust-native object storage   ← self-hosted
#
# For Google Cloud Storage or Azure Blob, see the notes at the bottom.
#
# Deploy (choose one of the sections below, then run):
#   helm install rushobs oci://... \
#     -f examples/rush-s3-tiering.yaml \
#     --set clickhouse.clickhouse.defaultUser.password_secret_name=my-ch-secret
# ──────────────────────────────────────────────────────────────────────────────


# ══════════════════════════════════════════════════════════════════════════════
# OPTION 1 — AWS S3 with IRSA (no static keys in the cluster)
#
# Pre-requisites:
#   • Create an S3 bucket, e.g. my-company-rushobs
#   • Attach a bucket policy granting s3:GetObject, s3:PutObject, s3:DeleteObject,
#     s3:ListBucket to an IAM role
#   • Annotate the ClickHouse ServiceAccount with that role ARN:
#       kubectl annotate sa rushobs-clickhouse \
#         eks.amazonaws.com/role-arn=arn:aws:iam::123456789012:role/rushobs-clickhouse
# ══════════════════════════════════════════════════════════════════════════════

