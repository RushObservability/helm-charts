# ──────────────────────────────────────────────────────────────────────────────
# OTHER PROVIDERS
#
# Google Cloud Storage (GCS)
# ─────────────────────────
# Use the GCS-compatible S3 endpoint with HMAC keys:
#   endpoint: https://storage.googleapis.com/YOUR_BUCKET/clickhouse/
#   access_key_id: <HMAC access key from GCS console>
#   secret_access_key: <HMAC secret>
#   region: ""    # not used by GCS but must be present
#
# Azure Blob Storage
# ──────────────────
# ClickHouse has a native azure_blob_storage disk type (>=22.6); alternatively
# use Azurite / SFTP bridge as an S3 endpoint. Native config:
#   <disks>
#     <azure>
#       <type>azure_blob_storage</type>
#       <storage_account_url>https://ACCOUNT.blob.core.windows.net/</storage_account_url>
#       <container_name>rushobs-clickhouse</container_name>
#       <account_name>ACCOUNT</account_name>
#       <account_key>BASE64_KEY</account_key>
#       <metadata_path>/var/lib/clickhouse/disks/azure/</metadata_path>
#     </azure>
#   </disks>
#
# Cloudflare R2
# ─────────────
# R2 is S3-compatible; use the account-specific endpoint:
#   endpoint: https://ACCOUNT_ID.r2.cloudflarestorage.com/BUCKET/clickhouse/
#   access_key_id: <R2 Access Key ID>
#   secret_access_key: <R2 Secret Access Key>
#   region: "auto"
# ──────────────────────────────────────────────────────────────────────────────
