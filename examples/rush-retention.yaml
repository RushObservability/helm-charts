# ──────────────────────────────────────────────────────────────────────────────
# RETENTION RULE REFERENCE
#
# Metric rules
# ────────────
# Each [[retention.metrics]] rule can have any combination of:
#   name        exact metric name match          (e.g. "http_requests_total")
#   name_regex  regex match on metric name       (e.g. "^node_.*")
#   labels      key/value pairs that must all match the metric's label set
#   retain_days days to keep; data older than this is deleted
#
# Trace rules
# ───────────
# Each [[retention.traces]] rule can have one of:
#   service_name  exact service name match
#   attribute     { key: "...", value: "..." } — matches a span attribute
# Plus:
#   retain_days   days to keep
#
# Enforcer settings
# ─────────────────
#   enabled        true/false — disable to pause all deletion
#   interval_secs  how often the enforcer runs (3600 = hourly)
#   dry_run        true = log what would be deleted but don't delete anything
#
# Tiering vs. retention
# ─────────────────────
# tiering.*_move_after_days — when ClickHouse migrates partitions to S3
#   → data is still queryable, just read from object storage (slower)
#   → set to 0 to disable tiering and keep everything on local disk
#
# retention.*_days — when Rush hard-deletes data (from both local disk and S3)
#   → should always be >= the corresponding tiering threshold
#   → example: move_after_days=7, retain_days=90 means:
#              7 days on SSD → 83 more days on S3 → deleted after 90 total days
# ──────────────────────────────────────────────────────────────────────────────
