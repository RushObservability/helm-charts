#     defaults:
#       metrics_days: 730    # 2 years default (SOC2 / HIPAA baseline)
#       traces_days: 365     # 1 year of traces
#       logs_days: 365
#     metrics:
#       # Short-lived operational noise: 30 days
#       - name_regex: ".*_scrape_.*"
#         retain_days: 30
#     traces:
#       # PCI-scoped services: 13 months (PCI DSS requirement)
#       - service_name: "checkout-api"
