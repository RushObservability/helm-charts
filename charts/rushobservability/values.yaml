# ── query-api ──
queryApi:
  image:
    repository: mzupan/rush-api
    tag: "0.1.24"
    pullPolicy: Always
  replicas: 1
  port: 8080
  # ── Bootstrap secrets (admin password + audit HMAC key) ──
  # Leave blank to AUTO-GENERATE on first install and preserve across upgrades
  # (stored in the <release>-bootstrap Secret — ArgoCD-style). Set a value to
  # pin/preset it, or point existingSecret at your own Secret to bring your own.
  adminPassword: ""        # INITIAL_ADMIN_PASSWORD — first-boot admin seed
  auditHmacSecret: ""      # RUSH_AUDIT_HMAC_SECRET — audit hash-chain key; MUST stay stable
  # Use a pre-created Secret instead of the auto-generated one. When set, the
  # chart creates no bootstrap Secret and reads these keys from yours:
  #   initial-admin-password, audit-hmac-secret
  existingSecret: ""
  env:
    CLICKHOUSE_DATABASE: observability
    RUST_LOG: rush_api=info,tower_http=info
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8080

# ══ Enterprise (commercial, license-gated) ══════════════════════════════
# Groups the commercial license and the paid add-ons it unlocks. Free
# integrations (ArgoCD) and core features (sre-agent) stay top-level.
enterprise:

  # ── Commercial license ──
  # When enabled, query-api reads RUSH_LICENSE_KEY from the named Secret and
  # verifies it offline. Create the secret with your minted license token:
  #   kubectl create secret generic rush-license --from-literal=license-key='<token>'
  license:
    enabled: false
    secret:
      name: rush-license
      key: license-key

    # ── Integrations unlocked by the license ──
    integrations:

      # ── postgres collector (paid add-on) ──
      # Monitors an external Postgres and ships metrics + query stats into Rush over
      # OTLP. Requires a license with the "postgres" entitlement — RUSH_LICENSE_KEY is
      # injected from .Values.enterprise.license.secret, so create that secret too.
      # Provide the Postgres DSN and the tenant ingest API key via a Secret:
      #   kubectl create secret generic rush-pg-collector \
      #     --from-literal=dsn='host=… user=rush_monitor password=… dbname=…' \
      #     --from-literal=api-key='rush_xxx'
      postgresCollector:
        enabled: false
        image:
          repository: mzupan/postgres-collector
          tag: "0.1.0"
          pullPolicy: Always
        secret:
          name: rush-pg-collector
          dsnKey: dsn
          apiKeyKey: api-key
        env:
          COLLECTOR_ENVIRONMENT: production
          RUST_LOG: info
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: "500m"
            memory: 256Mi

# ── sre-agent ──
sreAgent:
  enabled: false                     # disabled by default — requires LLM_API_KEY
  image:
    repository: mzupan/sre-agent
    tag: "0.1.0"
    pullPolicy: Always
  replicas: 1
  port: 8081
  env:
    CLICKHOUSE_DATABASE: observability
    RUST_LOG: sre_agent=info,tower_http=info
    LLM_BASE_URL: "https://api.openai.com"
    LLM_MODEL: "gpt-4o"
  # LLM API key — provide via --set or external secret
  # llmApiKey: "sk-..."
  llmApiKeySecret:
    name: ""                         # existing secret name (overrides llmApiKey)
    key: "api-key"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    port: 8081

# ── anomaly engine ──
# The anomaly engine evaluates rules and sends notifications. By default the
# query-api runs it in-process (fine for a single query-api replica). If you
# scale queryApi.replicas > 1, enable this dedicated single-replica Deployment —
# the chart then sets RUSH_RUN_ANOMALY_ENGINE=false on the API pods so rules are
# evaluated exactly once (no duplicate alerts).
anomalyEngine:
  enabled: false                     # set true when running multiple query-api pods
  image:
    repository: mzupan/rush-api
    tag: "0.1.32"
    pullPolicy: Always
  env:
    CLICKHOUSE_DATABASE: observability
    RUST_LOG: rush_api=info
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: "1"
      memory: 512Mi

# ── internal stats engine ──
# Cadence (seconds) for the rush_stats_* gauges the API emits about itself. 15s keeps
# rate()/short windows usable; raise it to cut the (tiny) sample volume.
statsEngine:
  intervalSecs: 15

# ── PromQL query behavior ──
# Staleness/lookback (seconds): how long a metric's last value is carried forward in
# range queries. Default 300 (Prometheus 5m). Lower it so a stopped series' flat tail
# ends sooner; keep it >= your slowest scrape interval or live series will show gaps.
promql:
  lookbackSecs: 300

# ── argocd integration ──
argocd:
  enabled: false                     # enable ArgoCD CRD reading
  namespace: argocd                  # namespace where ArgoCD apps live

# ── fluxcd integration (Flux v2 / GitOps Toolkit) ──
# Free integration: reads Kustomizations, HelmReleases, and Sources cluster-wide.
fluxcd:
  enabled: false                     # enable Flux v2 CRD reading
  namespace: flux-system             # default Flux namespace (resources read cluster-wide)

# ── kubernetes integration (read-only cluster browser) ──
# Free integration: lists core/apps/batch/networking resources cluster-wide (read-only).
kubernetes:
  enabled: false                     # enable the read-only Kubernetes resource browser

# ── cloudwatch integration (AWS CloudWatch Logs ingest via Kinesis Firehose) ──
# Free integration: ingests CloudWatch Logs pushed through a Kinesis Data Firehose
# HTTP endpoint. Tenant routing via access-key header or tenant URL path.
cloudwatch:
  enabled: false                     # enable CloudWatch Logs ingest endpoints

# ── frontend ──
frontend:
  image:
    repository: mzupan/rush-frontend
    tag: "0.1.12"
    pullPolicy: Always
  # Public base URL (scheme + host, no trailing slash) of the Rush API as seen from
  # outside the cluster. Surfaced to the UI wherever it shows or reaches the API by
  # its public address — e.g. the CloudWatch ingest endpoint AWS Firehose must POST
  # to. Set this when the public API host differs from where admins load the UI
  # (e.g. internal UI + public ingest endpoint). Empty → the UI uses its own origin.
  apiBaseUrl: ""
  replicas: 1
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 80

# ── Storage / S3 tiering — SINGLE source of truth ──
# Lives under `global` so ONE block drives both the query-api rush.toml AND the
# ClickHouse subchart's storage config. (Helm only shares values with subcharts
# via `global`; the clickhouse dependency cannot see `rushConfig`.) Enable S3
# tiering with just this block — the chart auto-generates the ClickHouse S3 disk
# + cold volume (see clickhouse.clickhouse.extraConfig). No hand-written XML.
global:
  storage:
    s3:
      enabled: false            # set true + fill in to enable S3 tiered storage
      endpoint: ""              # blank = AWS S3 native; set for MinIO/RustFS/etc.
      bucket: "rush-clickhouse"
      access_key_id: ""         # leave blank for keyless (IRSA / EKS Pod Identity)
      secret_access_key: ""
      region: "us-east-1"
    tiering:
      metrics_move_after_days: 3   # 0 = disabled, keep on local disk only
      traces_move_after_days: 3
      logs_move_after_days: 7

# ── rush.toml config ──
# Rendered into a ConfigMap and mounted into query-api at /etc/rush/rush.toml
rushConfig:
  retention:
    defaults:
      metrics_days: 30
      traces_days: 30
      logs_days: 30
    metrics: []
    # - labels: { env: "dev" }
    #   retain_days: 90
    # - labels: { env: "prod" }
    #   retain_days: 400
    traces: []
    # - service_name: "gateway"
    #   retain_days: 60
    enforcer:
      enabled: true
      interval_secs: 3600
      dry_run: false

# ── ClickHouse (Altinity subchart) ──
# Full options: https://github.com/Altinity/helm-charts/tree/main/charts/clickhouse
clickhouse:
  enabled: true
  clickhouse:
    defaultUser:
      password_secret_name: "rushobs-clickhouse-credentials"
      allowExternalAccess: true   # allow connections from other pods
    # Custom ClickHouse server configuration files.
    # rush_settings.xml: enables the 'rush_' custom settings prefix so that
    # rush-api can set `rush_tenant_id` per-query for row-level security
    # policies. Without this, getSetting('rush_tenant_id') in row policies
    # will fail with an unknown setting error.
    configurationFiles:
      rush_settings.xml: |
        <clickhouse>
          <custom_settings_prefixes>rush_</custom_settings_prefixes>
        </clickhouse>
    # ClickHouse server image. Upstream GA build: the `text` (full-text inverted) index
    # used for log/needle search is GA in 26.2; Altinity's stable line stops at 25.8.
    # The Altinity operator runs upstream server images fine. Pin a patch for reproducibility.
    image:
      repository: clickhouse/clickhouse-server
      tag: "26.2.19.43"
      pullPolicy: IfNotPresent
    # Bound ClickHouse memory. With NO limit the server sizes max_server_memory_usage to
    # ~90% of the whole node and the cgroup working-set grows unbounded. A hard limit caps
    # it and makes CH self-throttle instead of being OOM-killed. 8Gi is a conservative
    # baseline — SCALE WITH YOUR NODE and scale the cache sizes + memory profile below
    # proportionally. No CPU limit on purpose (merges/queries benefit from CPU burst).
    resources:
      requests:
        cpu: "500m"
        memory: "8Gi"
      limits:
        memory: "8Gi"
    # Cache sizes in bytes — right-size with the memory limit above. Referenced by
    # the auto-generated extraConfig below (defaults suit the 8Gi baseline).
    markCacheSize: 2147483648          # 2 GiB
    uncompressedCacheSize: 134217728   # 128 MiB
    s3CacheSize: 21474836480           # 20 GiB local cache for S3-tiered reads
    # Server log level (→ config.d/extra_config.xml <logger><level>). The operator
    # defaults to `debug`, which logs every executed query (full SQL, incl. user
    # search terms) — and Vector tails that back into the logs store. `information`
    # keeps warnings/errors without the per-query spam. Set `debug`/`trace` to
    # troubleshoot. Valid: none|fatal|error|warning|information|debug|trace.
    logLevel: information
    # Server config (→ config.d/extra_config.xml) is AUTO-GENERATED from
    # global.storage.s3 by the rush.clickhouseExtraConfig template:
    #   • always emits the `tiered` storage policy (REQUIRED — migrations create
    #     tables with storage_policy='tiered'; without it CREATE TABLE fails);
    #   • when global.storage.s3.enabled, also adds the S3 disk + cache + cold
    #     volume (keyless if no access keys are set).
    # Enable tiering with ONLY the global.storage.s3 block — no hand-written XML.
    # Override this string only for advanced ClickHouse storage customization.
    extraConfig: |
      {{- include "rush.clickhouseExtraConfig" . }}
    # Per-query / per-user memory ceilings (default profile). Caps one query below the
    # server budget so it fails gracefully (MEMORY_LIMIT_EXCEEDED) instead of OOM-killing
    # the pod; GROUP BY/ORDER BY still spill to disk first. Scale with the memory limit.
    extraUsers: |
      <clickhouse>
        <profiles>
          <default>
            <max_memory_usage>5368709120</max_memory_usage>
            <max_memory_usage_for_user>6442450944</max_memory_usage_for_user>
          </default>
        </profiles>
      </clickhouse>
  shardsCount: 1
  replicasCount: 1
  image:
    repository: clickhouse/clickhouse-server
    tag: "26.2.19.43"
    pullPolicy: IfNotPresent
  persistence:
    enabled: true
    storageClass: ""      # empty = cluster default
    size: 500Gi
  initScripts:
    enabled: true
    configMapName: "rushobs-clickhouse-init"
    alwaysRun: true
  service:
    type: ClusterIP
  keeper:
    enabled: false
  operator:
    # Set to false if the Altinity ClickHouse Operator is already installed
    # cluster-wide (e.g. shared by multiple teams or managed separately).
    # Rush will still deploy the ClickHouseInstallation CRD resource; it just
    # won't install the operator Deployment, RBAC, or CRDs again.
    enabled: true
    # Name applied to the operator's resources (Deployment/pod, RBAC, Secret,
    # ServiceMonitor, dashboards). Without this, the Altinity subchart names them
    # "<release>-operator" (e.g. rushobs-operator). Pin it to "clickhouse-operator"
    # so the operator is recognizable regardless of release name. Set to "" to
    # restore the release-prefixed default.
    fullnameOverride: clickhouse-operator

# ═══════════════════════════════════════════════════════════════════════
# Data collectors (optional)
#
# Deploy an ingestion pipeline that forwards metrics / traces / logs into
# the Rush ClickHouse. Four modes — pick one:
#
#   none    Bring your own collector. Rush deploys nothing here.
#           Point your collectors at the ClickHouse service directly.
#
#   otel    Deploy an OpenTelemetry Collector (contrib). Accepts OTLP on
#           :4317 (gRPC) and :4318 (HTTP). Handles traces, metrics, logs.
#           Runs as a Deployment (default, scalable) or DaemonSet.
#
#   vector  Deploy Vector as a DaemonSet on every node. Two sub-modes:
#             - logs      kubernetes_logs source only (cheapest, tails
#                         container stdout/stderr from the node)
#             - full-otel kubernetes_logs + OTLP receivers for traces &
#                         metrics
#
#   hybrid  OTel Collector for traces+metrics, Vector DaemonSet for logs.
#           Best when you want OTLP ingest centrally but don't want the
#           collector shipping every node's logs through a single pod.
# ═══════════════════════════════════════════════════════════════════════
collectors:
  mode: none                         # none | otel | vector | hybrid

  # ── OpenTelemetry Collector ──
  otel:
    image:
      repository: otel/opentelemetry-collector-contrib
      tag: "0.118.0"
      pullPolicy: IfNotPresent

    # deployment  — central, scalable, single service endpoint
    # daemonset   — one collector per node, receives from local workloads
    kind: deployment
    replicas: 2

    # HPA (only honored when kind=deployment)
    autoscaling:
      enabled: false
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70

    # Which signal pipelines to enable. Disabling a signal removes its
    # receiver pipeline entirely (the OTLP receiver itself still accepts
    # the wire format — it just isn't routed anywhere).
    signals:
      traces: true
      metrics: true
      logs: true

    resources:
      requests:
        cpu: 200m
        memory: 256Mi
      limits:
        cpu: "2"
        memory: 1Gi

    service:
      type: ClusterIP
      # Per-port override. 4317=OTLP gRPC, 4318=OTLP HTTP, 8888=collector
      # self-metrics (prometheus scrape).
      grpcPort: 4317
      httpPort: 4318

    # Raw collector config override. When set, replaces the generated
    # config entirely. Leave empty to use the generated config which
    # writes directly to the in-cluster ClickHouse.
    configOverride: ""

  # ── Vector ──
  vector:
    image:
      repository: timberio/vector
      # 0.51+ adds native OTLP decoding + an opentelemetry sink (encoding.codec: otlp),
      # which lets full-otel mode forward received OTLP traces/metrics/logs straight to
      # Rush's OTLP endpoints. 0.56 is the current stable.
      tag: "0.56.0-distroless-libc"
      pullPolicy: IfNotPresent

    # logs       — kubernetes_logs source only (DaemonSet)
    # full-otel  — kubernetes_logs + OTLP receivers on 4317/4318 that forward
    #              received traces/metrics/logs straight to Rush's OTLP endpoints
    #              (/v1/traces, /v1/metrics, /v1/logs). Acts as a single OTLP gateway.
    mode: logs

    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: "1"
        memory: 512Mi

    # Host paths mounted into the DaemonSet for the kubernetes_logs source.
    hostPath:
      varLog: /var/log
      varLibDockerContainers: /var/lib/docker/containers

    # Raw vector.yaml override. When set, replaces the generated config.
    configOverride: ""
