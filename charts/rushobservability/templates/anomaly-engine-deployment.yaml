{{- if .Values.anomalyEngine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-anomaly-engine
  labels:
    app.kubernetes.io/component: anomaly-engine
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: anomaly-engine
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: anomaly-engine
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/rush-config: {{ include (print $.Template.BasePath "/rush-config-configmap.yaml") . | sha256sum }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: anomaly-engine
          image: "{{ .Values.anomalyEngine.image.repository }}:{{ .Values.anomalyEngine.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.anomalyEngine.image.pullPolicy }}
          command: ["anomaly_engine"]
          env:
            - name: CLICKHOUSE_URL
              value: "http://clickhouse-{{ .Release.Name }}-clickhouse:8123"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: password
            - name: RUSH_CONFIG
              value: /etc/rush/rush.toml
            {{- range $key, $val := .Values.anomalyEngine.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: rush-config
              mountPath: /etc/rush
              readOnly: true
          resources:
            {{- toYaml .Values.anomalyEngine.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: rush-config
          configMap:
            name: {{ include "rush.fullname" . }}-rush-config
{{- end }}
