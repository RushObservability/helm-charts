apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rush.fullname" . }}-wide-config
  labels:
    app.kubernetes.io/component: query-api
    {{- include "rush.labels" . | nindent 4 }}
data:
  wide.toml: |
    {{- if .Values.wideConfig.storage.s3.enabled }}
    [storage.s3]
    endpoint = {{ .Values.wideConfig.storage.s3.endpoint | quote }}
    bucket = {{ .Values.wideConfig.storage.s3.bucket | quote }}
    access_key_id = {{ .Values.wideConfig.storage.s3.access_key_id | quote }}
    secret_access_key = {{ .Values.wideConfig.storage.s3.secret_access_key | quote }}
    region = {{ .Values.wideConfig.storage.s3.region | quote }}
    {{- end }}

    [storage.tiering]
    metrics_move_after_days = {{ .Values.wideConfig.storage.tiering.metrics_move_after_days }}
    traces_move_after_days = {{ .Values.wideConfig.storage.tiering.traces_move_after_days }}
    logs_move_after_days = {{ .Values.wideConfig.storage.tiering.logs_move_after_days }}

    [retention.defaults]
    metrics_days = {{ .Values.wideConfig.retention.defaults.metrics_days }}
    traces_days = {{ .Values.wideConfig.retention.defaults.traces_days }}
    logs_days = {{ .Values.wideConfig.retention.defaults.logs_days }}

    {{- range .Values.wideConfig.retention.metrics }}
    [[retention.metrics]]
    {{- if .name }}
    name = {{ .name | quote }}
    {{- end }}
    {{- if .name_regex }}
    name_regex = {{ .name_regex | quote }}
    {{- end }}
    {{- if .labels }}
    labels = { {{- $first := true }}{{- range $k, $v := .labels }}{{- if not $first }}, {{ end }}{{ $k }} = {{ $v | quote }}{{- $first = false }}{{- end }} }
    {{- end }}
    retain_days = {{ .retain_days }}
    {{- end }}

    {{- range .Values.wideConfig.retention.traces }}
    [[retention.traces]]
    {{- if .service_name }}
    service_name = {{ .service_name | quote }}
    {{- end }}
    {{- if .attribute }}
    attribute = { key = {{ .attribute.key | quote }}, value = {{ .attribute.value | quote }} }
    {{- end }}
    retain_days = {{ .retain_days }}
    {{- end }}

    [retention.enforcer]
    enabled = {{ .Values.wideConfig.retention.enforcer.enabled }}
    interval_secs = {{ .Values.wideConfig.retention.enforcer.interval_secs }}
    dry_run = {{ .Values.wideConfig.retention.enforcer.dry_run }}
