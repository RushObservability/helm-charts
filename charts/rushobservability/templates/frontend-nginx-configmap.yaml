apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rush.fullname" . }}-frontend-nginx
  labels:
    app.kubernetes.io/component: frontend
    {{- include "rush.labels" . | nindent 4 }}
data:
  default.conf.template: |
    server {
        listen {{ .Values.frontend.containerPort | default 80 }};

        # Browser-facing defenses belong here (the Rust API headers do not
        # protect static SPA responses). TLS termination should add HSTS.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # Runtime config served to the SPA. API_PUBLIC_URL is substituted from the
        # container env at start; empty by default (UI falls back to its own
        # origin). Exact match wins over the static .js rule; never cached.
        location = /runtime-config.js {
            default_type application/javascript;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            return 200 'window.__RUSH_CONFIG__={"apiBaseUrl":"${API_PUBLIC_URL}"};';
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SRE-agent routes (/api/v1/investigate, /sessions, /investigation-templates)
        # are no longer proxied directly to the agent here. query-api fronts the
        # agent (auth + tenant injection) and forwards to it, so these flow through
        # the /api/ block below. The /investigate SSE stream stays unbuffered
        # because query-api sets `X-Accel-Buffering: no` on that response.

        location /api/ {
            proxy_pass http://${QUERY_API_HOST}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /prom/ {
            proxy_pass http://${QUERY_API_HOST}/prom/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
