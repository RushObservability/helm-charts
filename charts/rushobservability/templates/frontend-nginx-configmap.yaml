apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rush.fullname" . }}-frontend-nginx
  labels:
    app.kubernetes.io/component: frontend
    {{- include "rush.labels" . | nindent 4 }}
data:
  default.conf.template: |
    server {
        listen 80;

        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|gif|ico)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

{{- if .Values.sreAgent.enabled }}
        # SRE Agent — SSE streaming endpoint
        location /api/v1/investigate {
            proxy_pass http://{{ include "rush.fullname" . }}-sre-agent:{{ .Values.sreAgent.service.port }}/api/v1/investigate;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
        }
        # SRE Agent — session history + investigation templates. These paths are
        # owned by the agent (not query-api); without these locations they fall
        # through to the /api/ block → query-api → 404, and the SRE Agent page's
        # availability probe (GET /api/v1/sessions) reports the agent as down.
        # No URI on proxy_pass → the full original request URI passes through, so
        # /api/v1/sessions, /api/v1/sessions/{id}, and query strings all forward.
        location /api/v1/sessions {
            proxy_pass http://{{ include "rush.fullname" . }}-sre-agent:{{ .Values.sreAgent.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 300s;
        }
        location /api/v1/investigation-templates {
            proxy_pass http://{{ include "rush.fullname" . }}-sre-agent:{{ .Values.sreAgent.service.port }};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
{{- end }}

        location /api/ {
            proxy_pass http://${QUERY_API_HOST}/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /prom/ {
            proxy_pass http://${QUERY_API_HOST}/prom/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
