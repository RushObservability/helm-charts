{{- if and .Values.sreAgent.enabled .Values.sreAgent.llmApiKey (not .Values.sreAgent.llmApiKeySecret.name) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "rush.fullname" . }}-sre-agent-llm
  labels:
    app.kubernetes.io/component: sre-agent
    {{- include "rush.labels" . | nindent 4 }}
type: Opaque
data:
  api-key: {{ .Values.sreAgent.llmApiKey | b64enc }}
{{- end }}
