{{- if .Values.enterprise.license.integrations.postgresCollector.enabled }}
# Paid Postgres monitoring add-on. Self-gates on the license: requires
# RUSH_LICENSE_KEY (from .Values.enterprise.license.secret) with the "postgres" entitlement,
# or the container exits. Single replica — running two would double-count metrics.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-postgres-collector
  labels:
    app.kubernetes.io/component: postgres-collector
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres-collector
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres-collector
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: postgres-collector
          image: "{{ .Values.enterprise.license.integrations.postgresCollector.image.repository }}:{{ .Values.enterprise.license.integrations.postgresCollector.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.enterprise.license.integrations.postgresCollector.image.pullPolicy }}
          env:
            - name: PG_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.license.integrations.postgresCollector.secret.name }}
                  key: {{ .Values.enterprise.license.integrations.postgresCollector.secret.dsnKey }}
            - name: RUSH_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.license.integrations.postgresCollector.secret.name }}
                  key: {{ .Values.enterprise.license.integrations.postgresCollector.secret.apiKeyKey }}
            # License token (Ed25519 JWT) — verified offline; needs "postgres" entitlement.
            - name: RUSH_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.license.secret.name }}
                  key: {{ .Values.enterprise.license.secret.key }}
            - name: RUSH_OTLP_ENDPOINT
              value: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.port }}"
            {{- range $key, $val := .Values.enterprise.license.integrations.postgresCollector.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.enterprise.license.integrations.postgresCollector.resources | nindent 12 }}
{{- end }}
