apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-frontend
  labels:
    app.kubernetes.io/component: frontend
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/nginx-config: {{ include (print $.Template.BasePath "/frontend-nginx-configmap.yaml") . | sha256sum }}
    spec:
      # The frontend serves static files and proxies /api. It needs no Kubernetes
      # API token. Port is configurable: the stock nginx image binds 80 (as root
      # to render its template); the Chainguard image runs non-root and binds 8080
      # — set frontend.containerPort accordingly (default 80).
      automountServiceAccountToken: false
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.containerPort | default 80 }}
          env:
            - name: QUERY_API_HOST
              value: "{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}"
            # Public base URL (scheme+host, no trailing slash) of the Rush API as
            # seen from outside the cluster, surfaced to the UI (e.g. the CloudWatch
            # ingest endpoint AWS Firehose posts to). Empty → UI uses its origin.
            - name: API_PUBLIC_URL
              value: "{{ .Values.frontend.apiBaseUrl | default "" }}"
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/templates/default.conf.template
              subPath: default.conf.template
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: nginx-config
          configMap:
            name: {{ include "rush.fullname" . }}-frontend-nginx
