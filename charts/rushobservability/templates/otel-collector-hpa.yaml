{{- if and (include "rush.otelEnabled" .) (eq .Values.collectors.otel.kind "deployment") .Values.collectors.otel.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rush.fullname" . }}-otel-collector
  labels:
    app.kubernetes.io/component: otel-collector
    {{- include "rush.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "rush.fullname" . }}-otel-collector
  minReplicas: {{ .Values.collectors.otel.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.collectors.otel.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.collectors.otel.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
