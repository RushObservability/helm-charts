{{- /*
  Bootstrap secret for query-api: the initial admin password and the audit-log
  HMAC key. For each value the resolution order is:
    1. an explicit preset in values (queryApi.adminPassword / queryApi.auditHmacSecret)
    2. the value already stored in this Secret — preserved across `helm upgrade`
       via `lookup` so it does NOT regenerate (critical for the audit HMAC key,
       which must stay stable or the audit hash-chain breaks)
    3. a freshly generated random value (first install only)

  If queryApi.existingSecret is set, this template renders nothing — the
  deployment reads the admin password + HMAC key from that Secret instead
  (expected keys: initial-admin-password, audit-hmac-secret).

  NOTE: `lookup` returns empty during `helm template`/`--dry-run` (no cluster
  access), so those render a throwaway random value each time. Real install/
  upgrade against a cluster preserve the stored value as described above.
*/ -}}
{{- if not .Values.queryApi.existingSecret }}
{{- $name := printf "%s-bootstrap" (include "rush.fullname" .) }}
{{- $existing := (lookup "v1" "Secret" .Release.Namespace $name) }}
{{- $curPw := "" }}
{{- $curHmac := "" }}
{{- if $existing }}
{{-   $curPw = (index $existing.data "initial-admin-password" | default "" | b64dec) }}
{{-   $curHmac = (index $existing.data "audit-hmac-secret" | default "" | b64dec) }}
{{- end }}
{{- $pw := .Values.queryApi.adminPassword | default $curPw | default (randAlphaNum 24) }}
{{- $hmac := .Values.queryApi.auditHmacSecret | default $curHmac | default (randAlphaNum 64) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $name }}
  labels:
    app.kubernetes.io/component: query-api
    {{- include "rush.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall` so the audit HMAC key (and admin password) aren't
    # lost — regenerating the HMAC key would break the audit hash-chain.
    "helm.sh/resource-policy": keep
type: Opaque
data:
  initial-admin-password: {{ $pw | b64enc | quote }}
  audit-hmac-secret: {{ $hmac | b64enc | quote }}
{{- end }}
