{{- if include "rush.vectorEnabled" . }}
{{- $chDatabase := .Values.queryApi.env.CLICKHOUSE_DATABASE | default "observability" -}}
{{- $chEndpoint := printf "http://%s:8123" (include "rush.clickhouseService" .) -}}
{{- $fullOtel := include "rush.vectorFullOtel" . -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rush.fullname" . }}-vector
  labels:
    app.kubernetes.io/component: vector
    {{- include "rush.labels" . | nindent 4 }}
data:
  vector.yaml: |
    {{- if .Values.collectors.vector.configOverride }}
    {{- .Values.collectors.vector.configOverride | nindent 4 }}
    {{- else }}
    api:
      enabled: true
      address: 0.0.0.0:8686

    sources:
      kubernetes_logs:
        type: kubernetes_logs
        auto_partial_merge: true
        pod_annotation_fields:
          pod_labels: ".pod_labels"
          pod_namespace: ".pod_namespace"
          pod_name: ".pod_name"
          pod_node_name: ".pod_node_name"
          container_name: ".container_name"
          container_image: ".container_image"
      {{- if $fullOtel }}
      otlp:
        type: opentelemetry
        grpc:
          address: 0.0.0.0:4317
        http:
          address: 0.0.0.0:4318
        # Decode OTLP natively so logs/traces/metrics forward straight to Rush's
        # OTLP endpoints via the opentelemetry sink (no remap). Requires Vector
        # >= 0.51. With OTLP decoding, metrics arrive as OTLP-preserving log events
        # — fine for pass-through forwarding (metric transforms are not available).
        use_otlp_decoding: true
      {{- end }}

    transforms:
      parse_logs:
        type: remap
        inputs:
          - kubernetes_logs
        source: |
          svc_name, err = to_string(.pod_labels."app.kubernetes.io/name")
          if err != null || svc_name == "" {
            svc_name, err = to_string(.pod_labels.app)
          }
          if err != null || svc_name == "" {
            svc_name, err = to_string(.container_name)
          }
          if err != null || svc_name == "" {
            svc_name = "unknown"
          }
          .ServiceName = svc_name
          .SeverityText = "INFO"
          .SeverityNumber = 9
          body = string!(.message)
          if match(body, r'(?i)\berror\b|panic|fatal') {
            .SeverityText = "ERROR"
            .SeverityNumber = 17
          } else if match(body, r'(?i)\bwarn(ing)?\b') {
            .SeverityText = "WARN"
            .SeverityNumber = 13
          } else if match(body, r'(?i)\bdebug\b') {
            .SeverityText = "DEBUG"
            .SeverityNumber = 5
          }
          .Body = body
          ts, err = to_unix_timestamp(.timestamp, unit: "nanoseconds")
          if err != null {
            ts = to_unix_timestamp(now(), unit: "nanoseconds")
          }
          .Timestamp = ts
          .ResourceAttributes = {}
          .ResourceAttributes."k8s.namespace.name" = to_string(del(.pod_namespace)) ?? ""
          .ResourceAttributes."k8s.pod.name" = to_string(del(.pod_name)) ?? ""
          .ResourceAttributes."k8s.node.name" = to_string(del(.pod_node_name)) ?? ""
          .ResourceAttributes."k8s.container.name" = to_string(del(.container_name)) ?? ""
          .ResourceAttributes."k8s.container.image" = to_string(del(.container_image)) ?? ""
          .LogAttributes = {}
          if exists(.pod_labels) {
            for_each(object!(.pod_labels)) -> |key, value| {
              .LogAttributes = set!(.LogAttributes, [key], value)
            }
          }
          .TraceId = ""
          .SpanId = ""
          .TraceFlags = 0
          .ResourceSchemaUrl = ""
          .ScopeSchemaUrl = ""
          .ScopeName = "vector"
          .ScopeVersion = ""
          .ScopeAttributes = {}
          .EventName = ""
          del(.message)
          del(.timestamp)
          del(.source_type)
          del(.pod_labels)
          del(.file)
          del(.stream)

    sinks:
      # Send parsed logs to query-api over HTTP — query-api is the only writer
      # to ClickHouse (it owns the durable disk spool + 429 backpressure).
      rush_api_logs:
        type: http
        inputs:
          - parse_logs
        uri: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}/api/v1/ingest/logs"
        method: post
        encoding:
          codec: json
        batch:
          max_events: 1000
          timeout_secs: 5
        request:
          # Retry on query-api 429 backpressure so nothing is lost while the spool drains.
          retry_attempts: 10
        healthcheck:
          enabled: false
      {{- if $fullOtel }}
      # full-otel sub-mode: traces, metrics, and OTLP logs received on 4317/4318 are
      # forwarded straight to Rush's native OTLP/HTTP endpoints (query-api owns the
      # spool + metric firewall). Uses the opentelemetry sink with codec=otlp, which
      # re-emits the OTLP-decoded events unchanged. (Vector >= 0.51.)
      rush_otlp_traces:
        type: opentelemetry
        inputs: ["otlp.traces"]
        protocol:
          type: http
          uri: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}/v1/traces"
          method: post
          encoding:
            codec: otlp
        request:
          retry_attempts: 10
        healthcheck:
          enabled: false
      rush_otlp_metrics:
        type: opentelemetry
        inputs: ["otlp.metrics"]
        protocol:
          type: http
          uri: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}/v1/metrics"
          method: post
          encoding:
            codec: otlp
        request:
          retry_attempts: 10
        healthcheck:
          enabled: false
      rush_otlp_logs:
        type: opentelemetry
        inputs: ["otlp.logs"]
        protocol:
          type: http
          uri: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}/v1/logs"
          method: post
          encoding:
            codec: otlp
        request:
          retry_attempts: 10
        healthcheck:
          enabled: false
      {{- end }}
    {{- end }}
{{- end }}
