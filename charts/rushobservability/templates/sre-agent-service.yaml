{{- if .Values.sreAgent.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rush.fullname" . }}-sre-agent
  labels:
    app.kubernetes.io/component: sre-agent
    {{- include "rush.labels" . | nindent 4 }}
spec:
  type: {{ .Values.sreAgent.service.type }}
  ports:
    - name: http
      port: {{ .Values.sreAgent.service.port }}
      targetPort: http
  selector:
    app.kubernetes.io/component: sre-agent
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
