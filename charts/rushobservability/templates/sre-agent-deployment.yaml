{{- if .Values.sreAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-sre-agent
  labels:
    app.kubernetes.io/component: sre-agent
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sreAgent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: sre-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: sre-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "rush.fullname" . }}-sre-agent
      securityContext:
        {{- toYaml .Values.sreAgent.podSecurityContext | nindent 8 }}
      containers:
        - name: sre-agent
          image: "{{ .Values.sreAgent.image.repository }}:{{ .Values.sreAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sreAgent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.sreAgent.port }}
          {{- $bootstrapSecret := .Values.queryApi.existingSecret | default (printf "%s-bootstrap" (include "rush.fullname" .)) }}
          env:
            - name: SRE_AGENT_PORT
              value: {{ .Values.sreAgent.port | quote }}
            - name: SRE_AGENT_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapSecret }}
                  key: sre-agent-internal-token
            - name: CLICKHOUSE_URL
              value: "http://clickhouse-{{ .Release.Name }}-clickhouse:8123"
            - name: CLICKHOUSE_DATABASE
              value: observability
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: password
            # URL of query-api used to fetch user-defined custom skills.
            # query-api owns the custom_skills table; sre-agent is a read-only
            # HTTP consumer so the two services don't need a shared volume.
            - name: QUERY_API_URL
              value: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.port }}"
            {{- if .Values.sreAgent.githubApp.enabled }}
            - name: GITHUB_APP_ID
              value: {{ required "sreAgent.githubApp.appId is required when GitHub App access is enabled" .Values.sreAgent.githubApp.appId | quote }}
            {{- if .Values.sreAgent.githubApp.defaultInstallationId }}
            - name: GITHUB_APP_INSTALLATION_ID
              value: {{ .Values.sreAgent.githubApp.defaultInstallationId | quote }}
            {{- end }}
            - name: GITHUB_API_URL
              value: {{ .Values.sreAgent.githubApp.apiUrl | quote }}
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /var/run/rush-github/private-key.pem
            - name: REPOSITORY_CACHE_DIR
              value: /var/run/rush-repositories
            {{- end }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.sreAgent.llmApiKeySecret.name }}
                  name: {{ .Values.sreAgent.llmApiKeySecret.name }}
                  key: {{ .Values.sreAgent.llmApiKeySecret.key }}
                  {{- else }}
                  name: {{ include "rush.fullname" . }}-sre-agent-llm
                  key: api-key
                  {{- end }}
            {{- if .Values.argocd.enabled }}
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.argocd.namespace | quote }}
            {{- end }}
            {{- if .Values.fluxcd.enabled }}
            - name: FLUXCD_NAMESPACE
              value: {{ .Values.fluxcd.namespace | quote }}
            {{- end }}
            {{- if .Values.kubernetes.enabled }}
            - name: KUBERNETES_ENABLED
              value: "true"
            {{- end }}
            - name: SRE_AGENT_KUBE_TENANT_NAMESPACES
              value: {{ .Values.sreAgent.kube.tenantNamespaces | toJson | quote }}
            - name: SRE_AGENT_KUBE_ALLOW_CLUSTER_SCOPED
              value: {{ .Values.sreAgent.kube.allowClusterScopedForAdmins | quote }}
            {{- range $key, $val := .Values.sreAgent.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.sreAgent.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          {{- if .Values.sreAgent.githubApp.enabled }}
          volumeMounts:
            - name: github-app-private-key
              mountPath: /var/run/rush-github
              readOnly: true
            - name: repository-cache
              mountPath: /var/run/rush-repositories
          {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      {{- if .Values.sreAgent.githubApp.enabled }}
      volumes:
        - name: github-app-private-key
          secret:
            secretName: {{ required "sreAgent.githubApp.privateKeySecret.name is required when GitHub App access is enabled" .Values.sreAgent.githubApp.privateKeySecret.name }}
            items:
              - key: {{ .Values.sreAgent.githubApp.privateKeySecret.key }}
                path: private-key.pem
                mode: 0440
        - name: repository-cache
          emptyDir:
            sizeLimit: {{ .Values.sreAgent.githubApp.cacheSizeLimit }}
      {{- end }}
{{- end }}
