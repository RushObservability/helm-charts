{{- if .Values.sreAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-sre-agent
  labels:
    app.kubernetes.io/component: sre-agent
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sreAgent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: sre-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: sre-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/wide-config: {{ include (print $.Template.BasePath "/wide-config-configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: sre-agent
          image: "{{ .Values.sreAgent.image.repository }}:{{ .Values.sreAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sreAgent.image.pullPolicy }}
          command: ["/usr/local/bin/wide-sre-agent"]
          ports:
            - name: http
              containerPort: {{ .Values.sreAgent.port }}
          env:
            - name: SRE_AGENT_PORT
              value: {{ .Values.sreAgent.port | quote }}
            - name: CLICKHOUSE_URL
              value: "http://clickhouse-{{ .Release.Name }}-clickhouse:8123"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: password
            - name: WIDE_CONFIG
              value: /etc/wide/wide.toml
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.sreAgent.llmApiKeySecret.name }}
                  name: {{ .Values.sreAgent.llmApiKeySecret.name }}
                  key: {{ .Values.sreAgent.llmApiKeySecret.key }}
                  {{- else }}
                  name: {{ include "rush.fullname" . }}-sre-agent-llm
                  key: api-key
                  {{- end }}
            {{- range $key, $val := .Values.sreAgent.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: wide-config
              mountPath: /etc/wide
              readOnly: true
          resources:
            {{- toYaml .Values.sreAgent.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: wide-config
          configMap:
            name: {{ include "rush.fullname" . }}-wide-config
{{- end }}
