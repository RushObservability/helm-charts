{{- if .Values.sreAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-sre-agent
  labels:
    app.kubernetes.io/component: sre-agent
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.sreAgent.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: sre-agent
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: sre-agent
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      serviceAccountName: {{ include "rush.fullname" . }}-query-api
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sre-agent
          image: "{{ .Values.sreAgent.image.repository }}:{{ .Values.sreAgent.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.sreAgent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.sreAgent.port }}
          {{- $bootstrapSecret := .Values.queryApi.existingSecret | default (printf "%s-bootstrap" (include "rush.fullname" .)) }}
          env:
            - name: SRE_AGENT_PORT
              value: {{ .Values.sreAgent.port | quote }}
            - name: SRE_AGENT_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapSecret }}
                  key: sre-agent-internal-token
            - name: CLICKHOUSE_URL
              value: "http://clickhouse-{{ .Release.Name }}-clickhouse:8123"
            - name: CLICKHOUSE_DATABASE
              value: observability
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: password
            # URL of query-api used to fetch user-defined custom skills.
            # query-api owns the custom_skills table; sre-agent is a read-only
            # HTTP consumer so the two services don't need a shared volume.
            - name: QUERY_API_URL
              value: "http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.port }}"
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  {{- if .Values.sreAgent.llmApiKeySecret.name }}
                  name: {{ .Values.sreAgent.llmApiKeySecret.name }}
                  key: {{ .Values.sreAgent.llmApiKeySecret.key }}
                  {{- else }}
                  name: {{ include "rush.fullname" . }}-sre-agent-llm
                  key: api-key
                  {{- end }}
            {{- if .Values.argocd.enabled }}
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.argocd.namespace | quote }}
            {{- end }}
            {{- if .Values.fluxcd.enabled }}
            - name: FLUXCD_NAMESPACE
              value: {{ .Values.fluxcd.namespace | quote }}
            {{- end }}
            {{- if .Values.kubernetes.enabled }}
            - name: KUBERNETES_ENABLED
              value: "true"
            {{- end }}
            {{- range $key, $val := .Values.sreAgent.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.sreAgent.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}
