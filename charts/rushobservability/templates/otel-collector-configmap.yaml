{{- if include "rush.otelEnabled" . }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rush.fullname" . }}-otel-collector
  labels:
    app.kubernetes.io/component: otel-collector
    {{- include "rush.labels" . | nindent 4 }}
data:
  collector.yaml: |
    {{- if .Values.collectors.otel.configOverride }}
    {{- .Values.collectors.otel.configOverride | nindent 4 }}
    {{- else }}
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:{{ .Values.collectors.otel.service.grpcPort }}
          http:
            endpoint: 0.0.0.0:{{ .Values.collectors.otel.service.httpPort }}

    processors:
      batch:
        timeout: 5s
        send_batch_size: 10000
        send_batch_max_size: 20000
      memory_limiter:
        check_interval: 2s
        limit_percentage: 80
        spike_limit_percentage: 15
      resource:
        attributes:
          - key: k8s.cluster.name
            value: "{{ .Release.Name }}"
            action: upsert
      transform/flatten:
        trace_statements:
          - context: span
            statements:
              - set(attributes["service.name"], resource.attributes["service.name"])
              - set(attributes["service.version"], resource.attributes["service.version"])
              - set(attributes["host.name"], resource.attributes["host.name"])

    exporters:
      # Send OTLP to query-api over HTTP — query-api is the only writer to
      # ClickHouse (it owns the durable disk spool + 429 backpressure).
      # otlphttp posts protobuf to {endpoint}/v1/{traces,logs,metrics}.
      otlphttp:
        endpoint: http://{{ include "rush.fullname" . }}-query-api:{{ .Values.queryApi.service.port }}
        encoding: proto
        timeout: 30s
        retry_on_failure:
          enabled: true
          initial_interval: 5s
          max_interval: 60s
        # Buffer + retry on query-api 429 backpressure so nothing is lost while
        # the spool drains.
        sending_queue:
          enabled: true
          num_consumers: 10
          queue_size: 5000

    service:
      telemetry:
        logs:
          level: info
        metrics:
          address: 0.0.0.0:8888
      pipelines:
        {{- if .Values.collectors.otel.signals.traces }}
        traces:
          receivers: [otlp]
          processors: [memory_limiter, resource, transform/flatten, batch]
          exporters: [otlphttp]
        {{- end }}
        {{- if .Values.collectors.otel.signals.metrics }}
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp]
        {{- end }}
        {{- if .Values.collectors.otel.signals.logs }}
        logs:
          receivers: [otlp]
          processors: [memory_limiter, resource, batch]
          exporters: [otlphttp]
        {{- end }}
    {{- end }}
{{- end }}
