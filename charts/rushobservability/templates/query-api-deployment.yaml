apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rush.fullname" . }}-query-api
  labels:
    app.kubernetes.io/component: query-api
    {{- include "rush.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.queryApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: query-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: query-api
        app.kubernetes.io/instance: {{ .Release.Name }}
      annotations:
        checksum/rush-config: {{ include (print $.Template.BasePath "/rush-config-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "rush.fullname" . }}-query-api
      securityContext:
        runAsNonRoot: true
        # Matches the appgroup created by query-api/Dockerfile and grants it
        # write access only to the dedicated spool volume.
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: query-api
          image: "{{ .Values.queryApi.image.repository }}:{{ .Values.queryApi.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.queryApi.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.queryApi.port }}
          env:
            - name: CLICKHOUSE_URL
              value: "http://clickhouse-{{ .Release.Name }}-clickhouse:8123"
            - name: CLICKHOUSE_USER
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: user
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rushobs-clickhouse-credentials
                  key: password
            - name: RUSH_CONFIG
              value: /etc/rush/rush.toml
            - name: RUSH_SPOOL_DIR
              value: /var/lib/rush/spool
            # Run the anomaly engine in-process only when there is no dedicated
            # anomaly-engine Deployment, so rules aren't evaluated twice.
            - name: RUSH_RUN_ANOMALY_ENGINE
              value: {{ not .Values.anomalyEngine.enabled | quote }}
            # Emit cadence for internal rush_stats_* gauges (15s keeps rate() usable).
            - name: RUSH_STATS_INTERVAL_SECS
              value: {{ .Values.statsEngine.intervalSecs | default 15 | quote }}
            # PromQL staleness/lookback: how long a metric's last value carries forward.
            - name: RUSH_PROM_LOOKBACK_SECS
              value: {{ .Values.promql.lookbackSecs | default 300 | quote }}
            {{- if .Values.argocd.enabled }}
            - name: ARGOCD_NAMESPACE
              value: {{ .Values.argocd.namespace | quote }}
            {{- end }}
            {{- if .Values.fluxcd.enabled }}
            - name: FLUXCD_NAMESPACE
              value: {{ .Values.fluxcd.namespace | quote }}
            {{- end }}
            {{- if .Values.kubernetes.enabled }}
            - name: KUBERNETES_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.cloudwatch.enabled }}
            - name: CLOUDWATCH_ENABLED
              value: "true"
            {{- end }}
            {{- if .Values.sreAgent.enabled }}
            - name: LLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.sreAgent.llmApiKeySecret.name }}
                  key: {{ .Values.sreAgent.llmApiKeySecret.key }}
            # query-api fronts the SRE agent: it authenticates + injects the
            # caller's tenant, then forwards /investigate, /sessions, and
            # /investigation-templates to the agent at this URL.
            - name: SRE_AGENT_URL
              value: "http://{{ include "rush.fullname" . }}-sre-agent:{{ .Values.sreAgent.service.port }}"
            {{- end }}
            {{- if .Values.enterprise.license.enabled }}
            # Commercial license (Ed25519-signed token), verified offline by the API.
            - name: RUSH_LICENSE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.enterprise.license.secret.name }}
                  key: {{ .Values.enterprise.license.secret.key }}
            {{- end }}
            {{- $bootstrapSecret := .Values.queryApi.existingSecret | default (printf "%s-bootstrap" (include "rush.fullname" .)) }}
            # First-boot admin seed + audit-log HMAC key. Auto-generated and
            # preserved across upgrades by query-api-secret.yaml (or supply your
            # own via queryApi.existingSecret). Never hard-code these in values.
            - name: INITIAL_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapSecret }}
                  key: initial-admin-password
            - name: RUSH_AUDIT_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapSecret }}
                  key: audit-hmac-secret
            {{- if .Values.sreAgent.enabled }}
            - name: SRE_AGENT_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $bootstrapSecret }}
                  key: sre-agent-internal-token
            {{- end }}
            {{- range $key, $val := .Values.queryApi.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
          volumeMounts:
            - name: rush-config
              mountPath: /etc/rush
              readOnly: true
            - name: rush-spool
              mountPath: /var/lib/rush/spool
          resources:
            {{- toYaml .Values.queryApi.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: rush-config
          configMap:
            name: {{ include "rush.fullname" . }}-rush-config
        - name: rush-spool
          emptyDir: {}
