apiVersion: v1
kind: ConfigMap
metadata:
  name: rushobs-clickhouse-init
  labels:
    {{- include "rush.labels" . | nindent 4 }}
data:
  # The full observability schema (spans, spans_raw, logs, metrics_*, rum, rum_replay,
  # materialized views) is created and kept up to date by the query-api migrations
  # (`migrations::run` on every boot) — that is the single source of truth. This init
  # only ensures the database exists so the OTel exporter / Vector can connect before
  # query-api has finished its first migration pass.
  001_init.sql: |
    CREATE DATABASE IF NOT EXISTS observability;
